name: Space History Daily

on:
  schedule:
    # 05:00 UTC — это 08:00 по московскому времени
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-history-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator

      - name: Execute History Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python history_bot.py
