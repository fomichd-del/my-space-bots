name: NASA Daily Content

on:
  schedule:
    - cron: '0 9 * * *'  # Утренний запуск (12:00 МСК)
    - cron: '0 15 * * *' # Вечерний запуск (18:00 МСК)
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Разрешение на сохранение файла памяти

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Post Content
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        shell: bash
        run: |
          # Проверяем, по какому расписанию запущен воркфлоу
          # Если cron на 9:00 — режим image, если на 15:00 — video
          if [[ "${{ github.event.schedule }}" == "0 9 * * *" ]]; then
            echo "Запуск: Утреннее фото"
            python cosmos_photo.py image
          elif [[ "${{ github.event.schedule }}" == "0 15 * * *" ]]; then
            echo "Запуск: Вечернее видео"
            python cosmos_photo.py video
          else
            # Если нажали кнопку вручную, по умолчанию шлем фото
            echo "Запуск: Ручной (режим Image)"
            python cosmos_photo.py image
          fi

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Добавляем файл базы данных в индекс
          git add last_cosmo_post.txt
          # Фиксируем изменения, если они есть
          git commit -m "Update NASA memory: $(date)" || echo "No changes to commit"
          # Подтягиваем изменения из репозитория, чтобы не было конфликтов
          git pull --rebase origin main
          # Отправляем в репозиторий
          git push origin main
