name: NASA Daily Content

on:
  schedule:
    - cron: '0 9 * * *'  # Утреннее фото
    - cron: '0 15 * * *' # Вечернее видео
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests deep-translator

      - name: Post Content
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: |
          # Если запуск в 9:00 — шлем image, в 15:00 — video
          if [ "${{ github.event.schedule }}" == "0 9 * * *" ]; then
            python cosmos_photo.py image
          elif [ "${{ github.event.schedule }}" == "0 15 * * *" ]; then
            python cosmos_photo.py video
          else
            python cosmos_photo.py image
          fi

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add last_cosmo_post.txt || true
          git commit -m "Update NASA memory" || true
          git pull --rebase origin main
          git push
