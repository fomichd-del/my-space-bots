name: earth_bot.py

on:
  schedule:
    # Запуск каждые 4 часа (00:00, 04:00, 08:00 и т.д. по UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Кнопка для ручного запуска в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
    
      - name: Install dependencies
        run: |
          pip install requests deep_translator
        
      - name: Run earth_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python earth_bot.py

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Проверка наличия файла истории, чтобы не упал commit
          touch last_earth_id.txt
          git add last_earth_id.txt
          git commit -m "Update Earth extensive history: $(date)" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
