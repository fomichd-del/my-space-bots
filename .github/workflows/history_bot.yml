name: history_bot.py

on:
  schedule:
    # Запуск в 07:00 UTC (10:00 по МСК) — идеальное время для уроков истории
    - cron: '0 7 * * *'
  workflow_dispatch:      # Кнопка для ручного запуска в интерфейсе

jobs:
  run-history:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Run history_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python history_bot.py

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Добавляем файл памяти history_bot
          git add last_history_event.txt
          git commit -m "Update history memory: $(date)" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
