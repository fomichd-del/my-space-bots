name: history_bot.py

on:
  schedule:
    - cron: '0 7 * * *' # Запуск каждое утро в 10:00 по МСК
  workflow_dispatch:

jobs:
  run-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests deep_translator
      - run: python history_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          touch last_history_event.txt
          git add last_history_event.txt
          git commit -m "Update history memory: $(date)" || echo "No changes"
          git pull --rebase origin main
          git push origin main
