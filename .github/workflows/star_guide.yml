name: Star Guide Post

on:
  schedule:
    # 17:00 UTC = 20:00 по времени Киева/Мск
    - cron: '0 17 * * *'
  workflow_dispatch: # Позволяет запустить бота вручную кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Star Guide
        env:
          # Проверь, что этот секрет добавлен в Settings -> Secrets -> Actions
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python star_guide.py
