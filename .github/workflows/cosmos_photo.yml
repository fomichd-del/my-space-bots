name: cosmos_photo.py

# 1. Расписание запусков
on:
  schedule:
    - cron: '0 9 * * *'  # Утренний запуск (12:00 МСК) — для ФОТО
    - cron: '0 15 * * *' # Вечерний запуск (18:00 МСК) — для ВИДЕО
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Run cosmos_photo.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        shell: bash
        run: |
          if [[ "${{ github.event.schedule }}" == "0 9 * * *" ]]; then
            echo "⏰ Режим: Утреннее фото"
            python cosmos_photo.py image
          elif [[ "${{ github.event.schedule }}" == "0 15 * * *" ]]; then
            echo "⏰ Режим: Вечернее видео"
            python cosmos_photo.py video
          else
            echo "▶️ Ручной запуск: режим Image"
            python cosmos_photo.py image
          fi

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add last_cosmo_*.txt
          git commit -m "Update NASA memory: $(date)" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
