name: Space Launch Notifier

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск каждые 30 минут
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешение на запись файла памяти
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Устанавливаем библиотеки для запросов и качественного перевода
        run: pip install requests deep-translator

      - name: Run Notifier
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python launch_notifier.py

      - name: Save memory (Commit and Push)
        # Этот блок сохраняет ID отправленных запусков в файл, чтобы не было дублей
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add sent_launches.txt || true
          git commit -m "Update sent launches list" || true
          git push
