name: Mars and Universe Daily

on:
  schedule:
    # 08:00 UTC — это ровно 11:00 по московскому времени
    - cron: '0 8 * * *'
  # Кнопка для ручного запуска
  workflow_dispatch:

jobs:
  run-mars-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator

      - name: Execute Mars Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python mars_bot.py
