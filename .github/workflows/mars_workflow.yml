name: Mars Photo Daily

# Настройка расписания запуска
on:
  schedule:
    # 15:30 UTC — это 18:30 по московскому времени
    - cron: '30 15 * * *'
  # Позволяет запускать бота вручную через вкладку Actions
  workflow_dispatch:

jobs:
  run-mars-bot:
    runs-on: ubuntu-latest
    steps:
      # 1. Копируем файлы из репозитория на виртуальный компьютер
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Устанавливаем библиотеку для запросов в интернет
      - name: Install dependencies
        run: pip install requests

      # 4. Запускаем нашего марсианского бота
      - name: Execute Mars Bot
        env:
          # Передаем секретные ключи из настроек GitHub в код
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python mars_bot.py
