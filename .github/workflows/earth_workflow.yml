name: Earth Photo Daily

on:
  schedule:
    - cron: '30 10 * * *' # 10:30 UTC
  workflow_dispatch:

permissions:
  contents: write  # Разрешаем боту записывать файлы в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run earth bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      run: python earth_bot.py

    - name: Save memory (Commit changes)
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add last_earth_id.txt || true
        git commit -m "Update sent images history" || true
        git push
