name: Asteroid Radar Daily

on:
  schedule:
    - cron: '30 6 * * *' # Каждый день в 06:30 UTC
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # МЫ УСТАНАВЛИВАЕМ ОБЕ БИБЛИОТЕКИ: Связь с NASA и Рисование
        pip install requests Pillow

    - name: Run asteroid bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      run: python asteroid_bot.py
