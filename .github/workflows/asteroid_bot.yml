name: Asteroid Radar Daily

on:
  schedule:
    # Запуск каждый день в 06:30 UTC
    - cron: '30 6 * * *'
  workflow_dispatch: # Кнопка для ручного запуска в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Устанавливаем сразу всё: и для связи с NASA, и для работы с фото
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run asteroid bot
        env:
          # Эти данные должны быть в Settings -> Secrets -> Actions
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python asteroid_bot.py
