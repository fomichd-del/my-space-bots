name: Space Automation

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск каждые 30 минут
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  run-all-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Run Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: |
          echo "🤖 Запуск основного бота (24ч / 1ч)..."
          python bot_launch.py
          echo "📡 Запуск Радара трансляций..."
          python space_radar.py

      - name: Save memory to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # Добавляем файлы, если они изменились
          git add db_launch.txt sent_radar_lives.txt || echo "No changes to add"
          # Пытаемся закоммитить, если есть что
          git commit -m "Update DB: $(date)" || echo "No changes to commit"
          # 🔥 КЛЮЧЕВАЯ ПРАВКА: Сначала забираем изменения других ботов, потом пушим своё
          git pull --rebase origin main
          git push origin main

