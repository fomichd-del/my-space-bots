name: Bot Launch Notifier

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot_launch.py # ИСПОЛЬЗУЕМ НОВОЕ ИМЯ

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Память обновлена: db_launch.txt"
          file_pattern: 'db_launch.txt' # ИСПОЛЬЗУЕМ НОВОЕ ИМЯ
