name: launch_notifier.py

on:
  schedule:
    - cron: '*/10 * * * *' # Проверка каждые 10 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests deep_translator

      - name: Run launch_notifier.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python launch_notifier.py

      - name: Save memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add sent_launches.txt sent_reminders.txt
          git commit -m "Update launch memory: $(date)" || echo "No changes"
          git pull --rebase origin main
          git push origin main
