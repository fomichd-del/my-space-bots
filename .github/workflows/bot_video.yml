name: Bot Video Cinema

on:
  schedule:
    # Запуск каждый час (можно изменить на нужный интервал)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Позволяет запускать бота вручную через вкладку Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Права на запись необходимы для сохранения истории в репозиторий
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests deep_translator Pillow

      - name: Run Video Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python bot_video.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Кинотеатр: история обновлена (last_video_date.txt)"
          file_pattern: 'last_video_date.txt'
