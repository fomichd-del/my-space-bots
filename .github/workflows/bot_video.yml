name: Space Bot v147.7 Deep Space

on:
  schedule:
    # 04:00 UTC = 07:00 по вашему времени (Утренний кофе)
    - cron: '0 4 * * *' 
    # 05:00 UTC = 08:00 по вашему времени (Второй запуск)
    - cron: '0 5 * * *'
    # 13:00 UTC = 16:00 по вашему времени (Дневной эфир)
    - cron: '0 13 * * *'
  workflow_dispatch:      

permissions:
  contents: write

jobs:
  mission-launch:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Копирование систем
      uses: actions/checkout@v4

    - name: 🐍 Подготовка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🦕 Установка Deno (Ключ к обходу YouTube)
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x

    - name: 🛠 Установка оборудования
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: 📦 Установка библиотек
      run: |
        pip install requests openai-whisper deep-translator
        pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

    - name: 🚀 Запуск v147.7
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python bot_video.py

    - name: 💾 Сохранение журнала
      run: |
        git config --global user.name "Space-Bot"
        git config --global user.email "bot@vladislav_space"
        git add last_video_date.txt last_source.txt
        git commit -m "📊 Реестр v147.7" || echo "Нет данных"
        git push origin main
