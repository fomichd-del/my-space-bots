name: Bot-video v161.0

on:
  schedule:
    - cron: '0 */3 * * *' # Запуск каждые 3 часа
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  mission-launch:
    runs-on: ubuntu-latest
    # Принудительно используем современную среду для скриптов
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🛰 Копирование систем
        uses: actions/checkout@v4

      - name: 🐍 Подготовка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🦕 Установка Deno (Ключ к обходу YouTube)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: 🛠 Установка оборудования (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Установка библиотек
        run: |
          pip install requests openai-whisper deep_translator
          pip install -U yt-dlp

      - name: 🚀 Запуск v161.0 'Quantum Sensor'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python bot_video.py

      - name: 💾 Сохранение журнала (Commit & Push)
        if: always()
        run: |
          git config --global user.name "Space-Bot"
          git config --global user.email "bot@vladislav_space"
          git add last_video_date.txt last_source.txt || true
          git commit -m "📊 Реестр v161.0 [автоматически]" || echo "Нет данных для сохранения"
          git push origin main
