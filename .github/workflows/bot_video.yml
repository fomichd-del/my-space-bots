name: Space Video Bot v43

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch: # Возможность ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Checkout code
      uses: actions/checkout@v3

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 🛠 Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp openai-whisper deep-translator

    - name: 🎬 Run Video Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot_video.py

    - name: 💾 Save memory (last_video_date.txt)
      run: |
        git config --global user.name "Space-Bot-Actions"
        git config --global user.email "bot@vladislav.space"
        git add last_video_date.txt
        git commit -m "📊 Обновление базы данных видео [автоматически]" || echo "Нет изменений для коммита"
        git push
