name: Space Bot v135.1 Stealth Release

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска

permissions:
  contents: write

jobs:
  mission-launch:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Копирование систем (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 Подготовка Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 🛠 Установка оборудования (FFmpeg и Node.js)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg nodejs

    - name: 📦 Установка библиотек
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp openai-whisper deep-translator

    - name: 🚀 Запуск Космического Бота
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python bot_video.py

    - name: 💾 Сохранение бортового журнала (Git Push)
      run: |
        git config --global user.name "Space-Bot-Actions"
        git config --global user.email "bot@vladislav.space"
        touch last_video_date.txt
        touch last_source.txt
        git add last_video_date.txt last_source.txt
        git commit -m "📊 Обновление реестра видео [v135.1]" || echo "Нет новых данных"
        git pull --rebase origin main
        git push origin main
