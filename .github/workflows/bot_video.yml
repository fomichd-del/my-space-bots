name: Space Bot v137.0 Ghost iOS

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

permissions:
  contents: write

jobs:
  mission-launch:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Копирование систем (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 Подготовка Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 🛠 Установка оборудования (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 📦 Установка сверхновых библиотек
      run: |
        python -m pip install --upgrade pip
        pip install requests openai-whisper deep-translator
        pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

    - name: 🚀 Запуск Космического Бота
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python bot_video.py

    - name: 💾 Сохранение бортового журнала (Git Push)
      run: |
        git config --global user.name "Space-Bot-Actions"
        git config --global user.email "bot@vladislav.space"
        touch last_video_date.txt
        touch last_source.txt
        git add last_video_date.txt last_source.txt
        git commit -m "📊 Обновление реестра видео [v137.0]" || echo "Нет новых данных"
        git pull --rebase origin main
        git push origin main
