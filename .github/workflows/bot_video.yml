name: Space Bot v60 Final

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 🛠 FFmpeg Setup
      run: sudo apt-get update && sudo apt-get install -y ffmpeg
    - name: 📦 Pip Install
      run: pip install requests yt-dlp openai-whisper deep-translator
    - name: 🚀 Run Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot_video.py
    - name: 💾 Git Save
      run: |
        git config --global user.name "Space-Bot"
        git config --global user.email "bot@space.com"
        git add last_video_date.txt
        git commit -m "📊 DB Update" || echo "No changes"
        git push
