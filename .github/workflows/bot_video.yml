name: Space Bot v90 Prime Release

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска в любое время

permissions:
  contents: write         # Разрешение боту записывать ID видео в базу данных

jobs:
  mission-launch:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Копирование систем (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 Подготовка Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 🛠 Установка FFmpeg (для субтитров)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 📦 Установка оборудования (библиотеки)
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp openai-whisper deep-translator

    - name: 🚀 Запуск Космического Бота
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python bot_video.py

    - name: 💾 Сохранение бортового журнала (Git Push)
      run: |
        git config --global user.name "Space-Bot-Actions"
        git config --global user.email "bot@vladislav.space"
        git add last_video_date.txt
        git commit -m "📊 Обновление реестра видео [v90.0]" || echo "Нет новых данных"
        git push
