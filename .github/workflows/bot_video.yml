name: Space Bot Final Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 🛠 System Setup (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: 📦 Pip Install
      run: |
        pip install requests yt-dlp openai-whisper deep-translator
        
    - name: 🚀 Launch Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot_video.py
      
    - name: 💾 Git Save (Memory)
      run: |
        git config --global user.name "Space-Bot"
        git config --global user.email "bot@vladislav.space"
        git add last_video_date.txt
        git commit -m "📊 Update DB" || echo "No changes"
        git push
