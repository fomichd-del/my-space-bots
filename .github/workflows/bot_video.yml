name: Bot Video Notifier

on:
  schedule:
    - cron: '*/30 * * * *' # Проверка каждые 30 минут (оптимально для NASA)
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Даем права на запись в репозиторий

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests deep_translator

      - name: Run Bot Video
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          CHANNEL_NAME: "@vladislav_space"
        run: python bot_video.py # ИСПОЛЬЗУЕМ НОВОЕ ИМЯ

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Память видео обновлена: db_video.txt"
          file_pattern: 'db_video.txt' # СОХРАНЯЕМ НОВЫЙ ФАЙЛ ПАМЯТИ
