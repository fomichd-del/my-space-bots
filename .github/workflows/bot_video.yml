name: Bot-video v168.0

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  mission-launch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🛰 Копирование систем
        uses: actions/checkout@v4

      - name: 🐍 Подготовка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🟢 Установка Node.js 20+ (Критично для EJS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠 Установка FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Установка системного набора 'Titanium+'
        run: |
          pip install requests openai-whisper deep_translator
          # 🔥 Критическое изменение из Wiki: ставим yt-dlp со всеми зависимостями EJS
          pip install -U "yt-dlp[default]"
          pip install bgutil-ytdlp-pot-provider

      - name: 🚀 Запуск v168.0 'Grandmaster'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python bot_video.py

      - name: 🧹 Уборка
        if: always()
        run: rm -f cookies.txt

      - name: 💾 Сохранение журнала
        if: always()
        run: |
          git config --global user.name "Space-Bot"
          git config --global user.email "bot@vladislav_space"
          git add last_video_date.txt last_source.txt || true
          git commit -m "📊 Реестр v168.0" || echo "Нет данных"
          git push origin main
