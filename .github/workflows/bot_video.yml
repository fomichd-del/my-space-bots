name: Space Video Bot v50 Supernova

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов (можно менять)
  workflow_dispatch:      # Кнопка для ручного запуска

permissions:
  contents: write         # Критически важно для сохранения last_video_date.txt

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰 Копирование репозитория
      uses: actions/checkout@v4

    - name: 🐍 Подготовка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Ускоряет повторные запуски

    - name: 🛠 Установка системного FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 📦 Установка бортового оборудования (библиотек)
      run: |
        python -m pip install --upgrade pip
        pip install requests yt-dlp openai-whisper deep-translator

    - name: 🎬 Запуск миссии (Бот)
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot_video.py

    - name: 💾 Сохранение бортового журнала (Memory)
      run: |
        git config --global user.name "Space-Bot-Actions"
        git config --global user.email "bot@vladislav.space"
        git add last_video_date.txt
        git commit -m "📊 Автоматическое обновление базы видео" || echo "Нет изменений для коммита"
        git push
