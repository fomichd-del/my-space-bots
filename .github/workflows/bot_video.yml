name: Bot-video v182.5 Supernova

on:
  schedule:
    # 07:00, 12:00, 17:00, 21:00 по Украине
    - cron: '0 4,9,14,18 * * *'
  workflow_dispatch:

jobs:
  mission-launch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛰 Копирование систем
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍 Подготовка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🟢 Установка Node.js (Критично для дешифровки YouTube)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠 Установка FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Установка библиотек
        run: |
          pip install requests openai-whisper deep_translator yt-dlp

      - name: 🚀 Запуск v182.5 'Supernova'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python bot_video.py

      - name: 💾 Сохранение журнала (Sync & Push)
        if: always()
        run: |
          git config --global user.name "Space-Bot"
          git config --global user.email "bot@vladislav_space"
          git pull --rebase origin main || echo "Нет изменений для pull"
          git add last_video_date.txt last_source.txt || true
          git commit -m "📊 Реестр v182.5 [Supernova Stability]" || echo "Нет новых данных"
          git push origin main
