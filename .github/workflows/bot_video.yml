name: Bot Video Cinema (AI Translation Edition)

on:
  schedule:
    # Запуск каждый час
    - cron: '0 * * * *'
  workflow_dispatch:
    # Возможность ручного запуска

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Права на запись для обновления файла памяти (last_video_date.txt)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install requests deep_translator Pillow openai-whisper

      - name: Run Video Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python bot_video.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Кинотеатр: AI перевод выполнен (last_video_date.txt)"
          file_pattern: 'last_video_date.txt'
