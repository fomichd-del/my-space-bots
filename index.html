<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр Управления Полетами</title>
    <style>
        body { background: #050a18; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { padding: 30px; border-radius: 30px; background: rgba(255,255,255,0.07); border: 2px solid #4db8ff; backdrop-filter: blur(15px); max-width: 350px; box-shadow: 0 0 40px rgba(77, 184, 255, 0.3); }
        h2 { font-size: 26px; color: #ffce00; margin-bottom: 10px; }
        p { color: #e0e0e0; font-size: 16px; margin-bottom: 25px; }
        .btn { display: block; margin: 15px 0; padding: 18px; color: white; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-pro { background: #3498db; border-bottom: 5px solid #2980b9; }
        .btn-lite { background: #2ecc71; border-bottom: 5px solid #27ae60; }
        .help { background: #fffae6; color: #333; padding: 15px; border-radius: 15px; font-size: 13px; margin-top: 25px; border: 2px dashed #f1c40f; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛰 ПУЛЬТ УПРАВЛЕНИЯ</h2>
        <p>Выбирай режим работы бортовых компьютеров:</p>
        
        <a href="#" id="link-pro" class="btn btn-pro">🚀 3D КАРТА (PRO)</a>
        <a href="#" id="link-lite" class="btn btn-lite">🛰 ЛЕГКАЯ КАРТА (LITE)</a>

        <div class="help">
            <b>ИНСТРУКЦИЯ ДЛЯ SAMSUNG S24:</b><br>
            Если 3D карта показывает белый экран — нажми <b>три точки</b> в самом верху экрана Telegram и выбери <b>"Открыть в браузере"</b>. В Chrome всё заработает идеально!
        </div>
    </div>

    <script>
        function set(lat, lon) {
            // Stellarium (Тяжелый 3D)
            document.getElementById('link-pro').href = `https://stellarium-web.org/skymap?lat=${lat}&lng=${lon}`;
            // Neave Planetarium (Чистый, красивый, без рекламы)
            document.getElementById('link-lite').href = `https://neave.com/planetarium/`;
        }
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => set(p.coords.latitude, p.coords.longitude), () => set(51.52, 31.28));
        } else { set(51.52, 31.28); }
    </script>
</body>
</html>
